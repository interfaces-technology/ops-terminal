name: Sync PR to Notion

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - ready_for_review
      - closed

# Notion writes only — no GitHub API token required beyond the event payload.
permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Sync PR state to Notion
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
        run: node scripts/sync-pr-to-notion.mjs
